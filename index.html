<html>
	<head>
		<title>Form Validation</title>
		<link rel="style.css" href="style.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>	
		<script src="script.js" defer></script>
	</head>
	<body>
		<form>
			<fieldset>
				<legend>Form Validation</legend>
				
				First-Name:
				<input type="text" name="FirstName" id="A1" placeholder="Enter Your First-Name..."/>
				<br/>
				<br/>
				
				Last-Name:
				<input type="text" name="LastName" id="B1" placeholder="Enter Your Last-Name..."/>
				<br/>
				<br/>
				
				Phone no.:
				<input type="number" name="number" id="C1" placeholder="Enter Your Mobile Number..."/>
				<br/>
				<br/>
				
				Gender:
				<input type="radio" name="gender" value="Male" id="D1"/>Male
				<input type="radio" name="gender" value="Female" id="D2"/>Female
				<input type="radio" name="gender" value="Other" id="D3"/>Other
				<br/>
				<br/>
				
				Date of Birth:
				<input type="date" id="E1"/>
				<br/>
				<br/>
				
				G-mail:
				<input type="email" name="gmail" id="F1" placeholder="Enter Your G-mail"/>
				<br/>
				<br/>
				
				Password:
				<input type="password" name="password" id="G1" placeholder="Enter Your Password"/>
				<br/>
				<br/>
				
				Conform-Password:
				<input type="password" name="Conform-password" id="H1" placeholder="Enter Your Conform-Password"/>
				<br/>
				<br/>
				
				<input type="submit" name="Submit" id="submit"/>
				<input type="Reset" name="Reset" id="reset"/>
			</fieldset>
		</form>
		
	</body>
</html>
